  .theme-btn{background:var(--card);border:1px solid var(--line);color:var(--ink);padding:6px 12px;border-radius:10px;cursor:pointer;font-size:.82rem;font-weight:600;}
  .theme-btn:hover{border-color:var(--accent);}

  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px;box-shadow:0 8px 24px rgba(0,0,0,.06);margin-bottom:18px;}

<body>
<main>
<div class="wrap">
  <div class="topbar">
    <a href="/"><button class="btn">← Back to all sections</button></a>
    <button class="theme-btn" id="themeBtn">🌙 Dark</button>
  </div>
  <div class="ad-slot medium">Advertisement — 300x250</div>
<div class="ad-slot" style="min-height:250px;max-width:336px;margin:14px auto 18px;text-align:center;">Advertisement — 336x280</div>
<div class="card">
    <span class="badge">Insurance</span>
    <h1>Insurance Estimate Tool</h1>
    
    
    
<label>State</label>
<select id="state">
  <option>California</option><option>Texas</option><option>Florida</option><option>New York</option><option>Illinois</option>
</select>
<div class="row">
  <div>
    <label>Age</label>
    <input id="age" type="number" value="22">
  </div>
  <div>
    <label>Car value ($)</label>
    <input id="value" type="number" value="18000">
  </div>
</div>
<label>Driving record</label>
<select id="record">
  <option>Clean</option>
  <option>1 accident</option>
  <option>2+ accidents</option>
</select>
<button class="btn" style="background:var(--accent);color:#fff;border:none;margin-top:16px;padding:12px 16px;" onclick="estimate()">Estimate</button>
<div id="out" class="result" style="display:none;"></div>

  </div>
</div>

<script>
function estimate(){
  const base = {California:140,Texas:115,Florida:130,'New York':155,Illinois:120};
  const state = document.getElementById('state').value;
  const age = Number(document.getElementById('age').value);
  const value = Number(document.getElementById('value').value);
  const record = document.getElementById('record').value;
  let est = base[state] || 120;
  if(age < 25) est += 60;
  if(age > 65) est -= 15;
  if(value > 30000) est += 40;
  if(record !== 'Clean') est += 70;
  const out = document.getElementById('out');
  out.style.display = 'block';
  out.textContent = 'Estimated monthly range: $' + Math.max(est - 20, 40) + ' - $' + (est + 25);
}
</script>

<script>
(function(){
  const themeBtn = document.getElementById('themeBtn');
  if (!themeBtn) return;
  function applyTheme(t){document.documentElement.setAttribute('data-theme', t); themeBtn.textContent = t === 'dark' ? '☀️ Light' : '🌙 Dark'; try { localStorage.setItem('dmvTheme', t); } catch(e) {}}
  let savedTheme = 'light';
  try { savedTheme = localStorage.getItem('dmvTheme') || 'light'; } catch(e) {}
  applyTheme(savedTheme);
  themeBtn.onclick = function(){ applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); };
})();
</script>
